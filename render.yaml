services:
  # ── FastAPI service (runs via Docker) ──────────────────────────────────────
  - type: web
    name: cinema-fastapi
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # you paste this manually in Render dashboard

  # ── Streamlit service (runs via Python) ────────────────────────────────────
  - type: web
    name: cinema-streamlit
    runtime: python
    region: oregon
    buildCommand: pip install streamlit requests
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        sync: false          # paste your FastAPI Render URL here after first deploy