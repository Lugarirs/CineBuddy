name: Deploy Cinema Agent

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Test App Starts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start FastAPI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          nohup uvicorn simple_agent.app:app --host 127.0.0.1 --port 8000 > fastapi.log 2>&1 &
          sleep 15        # ← increased from 5 to 15

      - name: Print FastAPI logs
        if: always()     # ← always print logs even if next step fails
        run: cat fastapi.log

      - name: Check FastAPI health
        run: |
          # Retry up to 5 times instead of failing immediately
          for i in {1..5}; do
            curl -f http://127.0.0.1:8000/health && break
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
      - name: Print Streamlit logs
        run: cat streamlit.log

      - name: Check Streamlit
        run: curl -f http://127.0.0.1:8501 || exit 1

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test          # only deploy if test job passes

    steps:
      - name: Deploy FastAPI to Render
        run: |
          curl -X POST "${{ secrets.RENDER_FASTAPI_DEPLOY_HOOK }}"

      - name: Deploy Streamlit to Render
        run: |
          curl -X POST "${{ secrets.RENDER_STREAMLIT_DEPLOY_HOOK }}"
